name: Japa
options:
  bundleIdPrefix: com.priyansh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Japa:
    type: application
    platform: iOS
    sources:
      - path: Japa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.priyansh.japa
        PRODUCT_NAME: Japa
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_KEY_CFBundleDisplayName: Japa
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
        Release:
          ENABLE_TESTABILITY: NO

  JapaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JapaTests
    dependencies:
      - target: Japa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.priyansh.japaTests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Japa.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Japa"
        BUNDLE_LOADER: "$(TEST_HOST)"

  JapaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JapaUITests
    dependencies:
      - target: Japa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.priyansh.japaUITests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
        TEST_TARGET_NAME: Japa

schemes:
  Japa:
    build:
      targets:
        Japa: all
        JapaTests: [test]
        JapaUITests: [test]
    test:
      targets:
        - JapaTests
        - JapaUITests
      gatherCoverageData: true
